name: push

on:
  push:
    branches:
      - main

env:
  CI: true
  APP_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-for-developers-project-74

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: make ci
  push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - run: make build
      - run: make push